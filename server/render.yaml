# Backend-only render configuration
services:
  - type: web
    name: dala-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: database
      mountPath: /data
      sizeGB: 1
