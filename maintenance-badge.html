<!-- Premium Work in Progress Badge - Add to all pages before closing </body> tag -->
<style>
  .wip-badge {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: linear-gradient(135deg, rgba(229, 57, 53, 0.95) 0%, rgba(198, 40, 40, 0.95) 100%);
    color: white;
    padding: 12px 20px;
    border-radius: 50px;
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 
      0 4px 20px rgba(229, 57, 53, 0.3),
      0 0 0 1px rgba(255, 255, 255, 0.1) inset;
    backdrop-filter: blur(10px);
    z-index: 9999;
    cursor: default;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    animation: wipPulse 3s ease-in-out infinite;
  }
  
  .wip-badge:hover {
    transform: translateY(-2px);
    box-shadow: 
      0 8px 30px rgba(229, 57, 53, 0.4),
      0 0 0 1px rgba(255, 255, 255, 0.2) inset;
  }
  
  .wip-badge--hidden {
    opacity: 0;
    transform: translateY(20px) scale(0.9);
    pointer-events: none;
  }
  
  @keyframes wipPulse {
    0%, 100% { 
      box-shadow: 
        0 4px 20px rgba(229, 57, 53, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.1) inset;
    }
    50% { 
      box-shadow: 
        0 6px 25px rgba(229, 57, 53, 0.4),
        0 0 0 2px rgba(255, 255, 255, 0.15) inset,
        0 0 20px rgba(229, 57, 53, 0.2);
    }
  }
  
  .wip-badge__dot {
    width: 8px;
    height: 8px;
    background: #4ade80;
    border-radius: 50%;
    animation: wipDotPulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  
  @keyframes wipDotPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.1); }
  }
  
  .wip-badge__text {
    white-space: nowrap;
  }
  
  .wip-badge__close {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: 4px;
    margin-right: -6px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.15);
    border: none;
    color: white;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }
  
  .wip-badge__close:hover {
    background: rgba(255, 255, 255, 0.25);
    transform: rotate(90deg);
  }
  
  /* Mobile: Move to bottom center on small screens */
  @media (max-width: 640px) {
    .wip-badge {
      bottom: 16px;
      right: 50%;
      transform: translateX(50%);
      padding: 10px 16px;
      font-size: 12px;
    }
    
    .wip-badge:hover {
      transform: translateX(50%) translateY(-2px);
    }
    
    .wip-badge--hidden {
      transform: translateX(50%) translateY(20px) scale(0.9);
    }
  }
</style>

<div class="wip-badge" id="wipBadge" role="status" aria-label="Website maintenance in progress">
  <span class="wip-badge__dot"></span>
  <span class="wip-badge__text">Work in Progress</span>
  <button class="wip-badge__close" onclick="dismissWipBadge()" aria-label="Dismiss notification">
    <i class="fas fa-times" style="font-size: 10px;"></i>
  </button>
</div>

<script>
  // Check if user has dismissed the badge before
  if (localStorage.getItem('wipBadgeDismissed')) {
    document.getElementById('wipBadge').classList.add('wip-badge--hidden');
  }
  
  function dismissWipBadge() {
    const badge = document.getElementById('wipBadge');
    badge.classList.add('wip-badge--hidden');
    localStorage.setItem('wipBadgeDismissed', 'true');
  }
  
  // Optional: Show badge again after 7 days
  const dismissedTime = localStorage.getItem('wipBadgeDismissedTime');
  if (dismissedTime) {
    const daysSinceDismissed = (Date.now() - parseInt(dismissedTime)) / (1000 * 60 * 60 * 24);
    if (daysSinceDismissed > 7) {
      localStorage.removeItem('wipBadgeDismissed');
      localStorage.removeItem('wipBadgeDismissedTime');
    }
  }
  
  function dismissWipBadge() {
    const badge = document.getElementById('wipBadge');
    badge.classList.add('wip-badge--hidden');
    localStorage.setItem('wipBadgeDismissed', 'true');
    localStorage.setItem('wipBadgeDismissedTime', Date.now().toString());
  }
</script>
