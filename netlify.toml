[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/store"
  to = "/store/index.html"
  status = 200

[[redirects]]
  from = "/store/"
  to = "/store/index.html"
  status = 200

[[redirects]]
  from = "/shop"
  to = "/store/index.html"
  status = 301

[[redirects]]
  from = "/shop/"
  to = "/store/index.html"
  status = 301

[[redirects]]
  from = "/shop/*"
  to = "/store/:splat"
  status = 301

[dev]
  port = 8888
  publish = "."
  autoLaunch = true
