[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/shop"
  to = "/shop/index.html"
  status = 200

[[redirects]]
  from = "/shop/"
  to = "/shop/index.html"
  status = 200

[dev]
  port = 8888
  publish = "."
  autoLaunch = true
