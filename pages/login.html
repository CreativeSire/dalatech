<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | DALA Technologies</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #E53935;
      --primary-dark: #C62828;
      --primary-light: #FFEBEE;
      --dark: #1A1A2E;
      --gray-50: #FAFAFA;
      --gray-100: #F5F5F5;
      --gray-200: #EEEEEE;
      --gray-300: #E0E0E0;
      --gray-400: #BDBDBD;
      --gray-500: #9E9E9E;
      --gray-600: #757575;
      --gray-700: #616161;
      --gray-800: #424242;
      --gray-900: #212121;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
      --shadow-xl: 0 24px 60px rgba(0,0,0,0.16);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #FAFAFA 0%, #F0F0F0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      line-height: 1.6;
    }

    .login-container {
      width: 100%;
      max-width: 440px;
      background: #FFFFFF;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      overflow: hidden;
    }

    .login-header {
      background: linear-gradient(135deg, var(--dark) 0%, #2D2D44 100%);
      padding: 48px 40px 40px;
      text-align: center;
      position: relative;
    }

    .login-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 30% 20%, rgba(229, 57, 53, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(229, 57, 53, 0.1) 0%, transparent 40%);
      pointer-events: none;
    }

    .login-header-content {
      position: relative;
      z-index: 1;
    }

    .login-logo {
      height: 48px;
      margin-bottom: 24px;
      filter: brightness(0) invert(1);
    }

    .login-header h1 {
      color: #FFFFFF;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .login-header p {
      color: rgba(255,255,255,0.7);
      font-size: 15px;
      font-weight: 400;
    }

    .login-body {
      padding: 40px;
    }

    .message {
      padding: 14px 16px;
      border-radius: var(--radius-md);
      font-size: 14px;
      margin-bottom: 24px;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .message.show {
      display: flex;
    }

    .message-error {
      background: #FEF2F2;
      color: #DC2626;
      border: 1px solid #FECACA;
    }

    .message i {
      font-size: 18px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-700);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-md);
      font-size: 15px;
      color: var(--gray-800);
      background: #FFFFFF;
      transition: all 0.2s ease;
    }

    .form-input::placeholder {
      color: var(--gray-400);
    }

    .form-input:hover {
      border-color: var(--gray-300);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(229, 57, 53, 0.08);
    }

    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--gray-400);
      cursor: pointer;
      padding: 4px;
      font-size: 16px;
      transition: color 0.2s ease;
    }

    .password-toggle:hover {
      color: var(--gray-600);
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--gray-600);
      cursor: pointer;
    }

    .remember-me input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .forgot-password {
      font-size: 14px;
      color: var(--primary);
      font-weight: 500;
      text-decoration: none;
    }

    .forgot-password:hover {
      text-decoration: underline;
    }

    .btn-primary {
      width: 100%;
      padding: 16px 24px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: #FFFFFF;
      border: none;
      border-radius: var(--radius-md);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(229, 57, 53, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(229, 57, 53, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #FFFFFF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .social-login {
      margin-top: 24px;
      text-align: center;
    }

    .social-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      color: var(--gray-400);
      font-size: 13px;
    }

    .social-divider::before,
    .social-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-200);
    }

    .btn-google {
      width: 100%;
      padding: 14px 24px;
      background: #FFFFFF;
      color: var(--gray-700);
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .btn-google:hover {
      background: var(--gray-50);
      border-color: var(--gray-300);
    }

    .btn-google i {
      color: #4285F4;
      font-size: 18px;
    }

    .login-footer {
      text-align: center;
      padding: 24px 40px 40px;
      border-top: 1px solid var(--gray-100);
    }

    .login-footer p {
      color: var(--gray-500);
      font-size: 15px;
    }

    .login-footer a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      body {
        padding: 0;
        background: #FFFFFF;
      }

      .login-container {
        border-radius: 0;
        box-shadow: none;
        min-height: 100vh;
      }

      .login-header {
        padding: 32px 24px;
      }

      .login-body {
        padding: 24px;
      }

      .form-options {
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
      }

      .login-footer {
        padding: 20px 24px 32px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-header-content">
        <a href="../index.html">
          <img src="../4.png" alt="DALA Technologies" class="login-logo">
        </a>
        <h1>Welcome Back</h1>
        <p>Sign in to your DALA account</p>
      </div>
    </div>

    <div class="login-body">
      <div class="message message-error" id="errorMessage">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText"></span>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="email" placeholder="you@company.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-wrapper">
            <input type="password" class="form-input" id="password" placeholder="Enter your password" required>
            <button type="button" class="password-toggle" onclick="togglePassword()">
              <i class="fas fa-eye" id="toggleIcon"></i>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="remember">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-password">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">
          <span>Sign In</span>
        </button>

        <div class="social-login">
          <div class="social-divider">or continue with</div>
          <button type="button" class="btn-google" onclick="handleGoogleSignIn()">
            <i class="fab fa-google"></i>
            <span>Sign in with Google</span>
          </button>
        </div>
      </form>
    </div>

    <div class="login-footer">
      <p>Don't have an account? <a href="signup.html">Create account</a></p>
    </div>
  </div>

  <script>
    const API_URL = window.location.hostname === 'localhost' 
      ? 'http://localhost:8888/api'
      : '/api';

    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const toggleIcon = document.getElementById('toggleIcon');

      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
      }
    }

    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      document.getElementById('errorText').textContent = message;
      errorDiv.classList.add('show');
      setTimeout(() => errorDiv.classList.remove('show'), 5000);
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Signing in...';

      const formData = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        remember: document.getElementById('remember').checked
      };

      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('dala_token', data.token);
          localStorage.setItem('dala_user', JSON.stringify(data.user));
          window.location.href = data.user.userType === 'retailer' ? 'dashboard-retailer.html' : 'dashboard-brand.html';
        } else {
          showError(data.message || 'Invalid credentials');
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<span>Sign In</span>';
        }
      } catch (error) {
        showError('Network error. Please try again.');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>Sign In</span>';
      }
    });

    function handleGoogleSignIn() {
      alert('Google Sign-In coming soon!');
    }
  </script>
</body>
</html>
