<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | DALA Shop</title>
  <meta name="description" content="Review your DALA shop cart before placing a manual order or quote request.">
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="shortcut icon" href="../favicon.png">
  <link rel="apple-touch-icon" href="../favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/shop.css">
</head>
<body class="shop-body" data-shop-page="cart">
  <nav class="navbar">
    <div class="navbar-container">
      <a href="../index.html" class="logo"><img src="../4.png" alt="DALA Technologies" class="logo-img"></a>
      <div class="nav-links">
        <a href="../pages/for-brands.html" class="nav-link">DALA for Brands</a>
        <a href="../pages/for-supermarkets.html" class="nav-link">DALA for Supermarkets</a>
        <a href="../pages/about.html" class="nav-link">About Us</a>
        <a href="../pages/case-studies.html" class="nav-link">Case Studies</a>
        <a href="../pages/contact.html" class="nav-link">Contact Us</a>
        <a href="/shop/" class="nav-link active">Shop</a>
        <a href="../pages/signup.html" class="nav-cta">Sign Up</a>
      </div>
      <button class="mobile-menu-btn" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <main class="shop-shell">
    <section class="shop-section">
      <div class="shop-container">
        <div class="shop-section-header">
          <div>
            <span class="shop-section-kicker"><i class="fas fa-cart-shopping"></i> Cart</span>
            <h2>Review your selected products</h2>
          </div>
          <p>Move from browsing into a quote request or manual order without losing the premium storefront experience.</p>
        </div>
        <div class="shop-cart-layout">
          <div class="shop-cart-card" data-cart-items></div>
          <aside class="shop-cart-card shop-cart-float">
            <div class="shop-checkout-summary">
              <div class="shop-summary-row"><span>Subtotal</span><strong data-cart-subtotal>₦0</strong></div>
              <a class="shop-btn shop-btn-primary" href="/shop/checkout.html">Manual checkout</a>
              <a class="shop-btn shop-btn-secondary" href="/shop/checkout.html?mode=quote">Request a quote</a>
              <a class="shop-btn shop-btn-dark" href="/shop/">Continue shopping</a>
            </div>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <script src="../js/main.js"></script>
  <script src="../js/shop.js"></script>
  <script defer src="/js/wip-badge.js"></script>
</body>
</html>
