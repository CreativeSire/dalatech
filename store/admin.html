<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DALA Store Admin</title>
  <meta name="description" content="Edit DALA Store products, pricing, and collection assignments.">
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="shortcut icon" href="../favicon.png">
  <link rel="apple-touch-icon" href="../favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/store.css">
</head>
<body class="store-body" data-store-page="admin">
  <nav class="navbar">
    <div class="navbar-container">
      <a href="../index.html" class="logo"><img src="../4.png" alt="DALA Technologies" class="logo-img"></a>
      <div class="nav-links">
        <a href="../pages/for-brands.html" class="nav-link">DALA for Brands</a>
        <a href="../pages/for-supermarkets.html" class="nav-link">DALA for Supermarkets</a>
        <a href="../pages/about.html" class="nav-link">About Us</a>
        <a href="../pages/case-studies.html" class="nav-link">Case Studies</a>
        <a href="../pages/contact.html" class="nav-link">Contact Us</a>
        <a href="/store/" class="nav-link active">Store</a>
        <a href="../pages/signup.html" class="nav-cta">Sign Up</a>
      </div>
      <button class="mobile-menu-btn" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <main class="store-shell">
    <section class="store-section">
      <div class="store-container">
        <div class="store-checkout-layout">
          <section class="store-panel">
            <span class="store-kicker"><i class="fas fa-pen-ruler"></i> Store editor</span>
            <h1 class="store-page-title">Edit products and pricing</h1>
            <p class="store-panel-copy">This keeps product and pricing edits simple while the full Store admin continues to evolve.</p>

            <label class="store-field">
              <span>Admin key</span>
              <input type="text" data-admin-key placeholder="Enter SHOP_ADMIN_KEY">
            </label>

            <form class="store-form-grid" data-admin-form>
              <label class="store-field">
                <span>Slug</span>
                <input type="text" name="slug" required>
              </label>
              <label class="store-field">
                <span>Name</span>
                <input type="text" name="name" required>
              </label>
              <label class="store-field">
                <span>Category</span>
                <select name="categorySlug" data-admin-category></select>
              </label>
              <label class="store-field">
                <span>SKU</span>
                <input type="text" name="sku">
              </label>
              <label class="store-field store-field--full">
                <span>Short description</span>
                <input type="text" name="shortDescription">
              </label>
              <label class="store-field store-field--full">
                <span>Full description</span>
                <textarea name="description" rows="5"></textarea>
              </label>
              <label class="store-field">
                <span>Price</span>
                <input type="number" name="price" min="0" step="0.01" required>
              </label>
              <label class="store-field">
                <span>Compare-at price</span>
                <input type="number" name="compareAtPrice" min="0" step="0.01">
              </label>
              <label class="store-field">
                <span>Badge</span>
                <input type="text" name="badge">
              </label>
              <label class="store-field">
                <span>Stock status</span>
                <select name="stockStatus">
                  <option value="in_stock">In stock</option>
                  <option value="low_stock">Low stock</option>
                  <option value="out_of_stock">Out of stock</option>
                </select>
              </label>
              <label class="store-field">
                <span>Featured</span>
                <select name="featured">
                  <option value="false">No</option>
                  <option value="true">Yes</option>
                </select>
              </label>
              <label class="store-field">
                <span>Sort order</span>
                <input type="number" name="sortOrder" min="0" step="1">
              </label>
              <label class="store-field store-field--full">
                <span>Primary image path</span>
                <input type="text" name="image">
              </label>
              <label class="store-field store-field--full">
                <span>Gallery image paths</span>
                <textarea name="gallery" rows="4" placeholder="Separate paths with commas"></textarea>
              </label>
              <div class="store-field store-field--full">
                <button class="store-btn store-btn-primary" type="submit">Save product</button>
              </div>
            </form>
          </section>

          <aside class="store-panel">
            <span class="store-kicker"><i class="fas fa-table-list"></i> Current products</span>
            <h2 class="store-page-title">Live inventory snapshot</h2>
            <div class="store-form-grid" data-admin-products></div>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <script src="../js/main.js"></script>
  <script src="../js/store.js"></script>
</body>
</html>
