<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | DALA Store</title>
  <meta name="description" content="Complete a DALA Store manual order or quote request with a clean buyer and delivery flow.">
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="shortcut icon" href="../favicon.png">
  <link rel="apple-touch-icon" href="../favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/store.css">
</head>
<body class="store-body" data-store-page="checkout">
  <nav class="navbar">
    <div class="navbar-container">
      <a href="../index.html" class="logo"><img src="../4.png" alt="DALA Technologies" class="logo-img"></a>
      <div class="nav-links">
        <a href="../pages/for-brands.html" class="nav-link">DALA for Brands</a>
        <a href="../pages/for-supermarkets.html" class="nav-link">DALA for Supermarkets</a>
        <a href="../pages/about.html" class="nav-link">About Us</a>
        <a href="../pages/case-studies.html" class="nav-link">Case Studies</a>
        <a href="../pages/contact.html" class="nav-link">Contact Us</a>
        <a href="/store/" class="nav-link active">Store</a>
        <a href="../pages/signup.html" class="nav-cta">Sign Up</a>
      </div>
      <button class="mobile-menu-btn" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <main class="store-shell">
    <section class="store-section">
      <div class="store-container">
        <div class="store-checkout-layout">
          <div class="store-panel">
            <span class="store-kicker" data-checkout-mode>Manual order</span>
            <h1 class="store-page-title" data-checkout-heading>Complete your order</h1>
            <p class="store-panel-copy">Share the buyer and delivery details we need to process this cleanly and follow up quickly.</p>

            <form data-checkout-form class="store-form-grid">
              <label class="store-field">
                <span>Full name</span>
                <input type="text" name="customerName" required>
              </label>
              <label class="store-field">
                <span>Company name</span>
                <input type="text" name="companyName">
              </label>
              <label class="store-field">
                <span>Email</span>
                <input type="email" name="email" required>
              </label>
              <label class="store-field">
                <span>Phone number</span>
                <input type="text" name="phone" required>
              </label>
              <label class="store-field">
                <span>Address line 1</span>
                <input type="text" name="addressLine1">
              </label>
              <label class="store-field">
                <span>Address line 2</span>
                <input type="text" name="addressLine2">
              </label>
              <label class="store-field">
                <span>City</span>
                <input type="text" name="city">
              </label>
              <label class="store-field">
                <span>State</span>
                <input type="text" name="state">
              </label>
              <label class="store-field store-field--full">
                <span>Notes</span>
                <textarea name="notes" rows="5" placeholder="Add delivery instructions, quote context, or any detail that will help us process this better."></textarea>
              </label>
              <div class="store-field store-field--full">
                <button class="store-btn store-btn-primary" type="submit">Place manual order</button>
              </div>
            </form>
          </div>

          <aside class="store-panel store-panel--sticky">
            <div class="store-summary">
              <h2>Order summary</h2>
              <div data-checkout-items></div>
              <div class="store-summary-row">
                <span>Subtotal</span>
                <strong data-checkout-subtotal>₦0</strong>
              </div>
            </div>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <script src="../js/main.js"></script>
  <script src="../js/store.js"></script>
</body>
</html>
