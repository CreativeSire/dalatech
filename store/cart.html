<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | DALA Store</title>
  <meta name="description" content="Review your selected DALA Store products before placing a manual order or requesting a quote.">
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="shortcut icon" href="../favicon.png">
  <link rel="apple-touch-icon" href="../favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/store.css">
</head>
<body class="store-body" data-store-page="cart">
  <nav class="navbar">
    <div class="navbar-container">
      <a href="../index.html" class="logo"><img src="../4.png" alt="DALA Technologies" class="logo-img"></a>
      <div class="nav-links">
        <a href="../pages/for-brands.html" class="nav-link">DALA for Brands</a>
        <a href="../pages/for-supermarkets.html" class="nav-link">DALA for Supermarkets</a>
        <a href="../pages/about.html" class="nav-link">About Us</a>
        <a href="../pages/case-studies.html" class="nav-link">Case Studies</a>
        <a href="../pages/contact.html" class="nav-link">Contact Us</a>
        <a href="/store/" class="nav-link active">Store</a>
        <a href="../pages/signup.html" class="nav-cta">Sign Up</a>
      </div>
      <button class="mobile-menu-btn" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <main class="store-shell">
    <section class="store-section">
      <div class="store-container">
        <div class="store-section-head">
          <div>
            <span class="store-section-kicker"><i class="fas fa-cart-shopping"></i> Cart</span>
            <h1 class="store-page-title">Review your selected products</h1>
          </div>
          <p>Adjust quantities, remove items, then move into manual checkout or request a quote.</p>
        </div>

        <div class="store-cart-layout">
          <div class="store-panel" data-cart-items></div>
          <aside class="store-panel store-panel--sticky">
            <div class="store-summary">
              <div class="store-summary-row">
                <span>Subtotal</span>
                <strong data-cart-subtotal>₦0</strong>
              </div>
              <a class="store-btn store-btn-primary" href="/store/checkout.html">Manual checkout</a>
              <a class="store-btn store-btn-secondary" href="/store/checkout.html?mode=quote">Request a quote</a>
              <a class="store-btn store-btn-dark" href="/store/">Continue shopping</a>
            </div>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <script src="../js/main.js"></script>
  <script src="../js/store.js"></script>
</body>
</html>
