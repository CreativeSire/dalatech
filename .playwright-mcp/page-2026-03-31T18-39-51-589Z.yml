  - generic [ref=e34]:
    - generic [ref=e35]:
      - generic [ref=e36]: Our Journey
      - heading "From the Problem We Lived" [level=2] [ref=e37]
    - generic [ref=e38]:
      - article [ref=e39]:
        - generic [ref=e40]: "01"
        - generic [ref=e41]:
          - generic [ref=e42]: Who We Are
          - heading "Born From the Problem We Lived" [level=3] [ref=e43]
          - paragraph [ref=e44]: Before DALA became what it is today, we were you. We had a company that was slowly dying. Not because the product wasn't good. Not because customers didn't want it. But because the operational chaos of Nigerian retail was eating us alive.
          - paragraph [ref=e45]: Deliveries were killing our cash flow. Getting into stores felt impossible. Small order quantities were not worth it to logistics companies, so we stayed stuck in a handful of locations while competitors expanded. Every day felt like we were running harder just to stay in the same place.
          - paragraph [ref=e46]:
            - strong [ref=e47]: That is when DALA was born — not as a business idea, but as a lifeline.
            - text: We built the operational engine we desperately needed to save our own company. And it worked.
      - article [ref=e48]:
        - generic [ref=e49]: "02"
        - generic [ref=e50]:
          - generic [ref=e51]: Why We Exist
          - heading "What We Learned Changes Everything" [level=3] [ref=e52]
          - paragraph [ref=e53]: DALA helped Wilson Lemonade scale from struggling in a few stores to thriving in over 300 modern retail locations. What took close to a decade to achieve on our own could have been done in one to two years with the right system from the start.
          - paragraph [ref=e54]: "We learned: the problem was never the product. It was the operations. When you cannot deliver efficiently, you cannot scale. When payments are unpredictable, you cannot plan. When you are buried in logistics instead of marketing, your brand cannot grow."
          - paragraph [ref=e55]:
            - strong [ref=e56]: We lived that reality. And we found a way out.
            - text: After we saved Wilson Lemonade, other founders started reaching out because they had great products people loved, but broken systems were holding them back too.
      - article [ref=e57]:
        - generic [ref=e58]: "03"
        - generic [ref=e59]:
          - generic [ref=e60]: What We Do Today
          - heading "Sharing What Saved Us" [level=3] [ref=e61]
          - paragraph [ref=e62]: That is when we realized DALA could not remain just our internal engine. It had to become the operational partner we once needed. Today, DALA helps founders escape operational chaos and scale with structure.
          - paragraph [ref=e63]: "We handle the push — store relationships, delivery, merchandising, and payment collection — while you focus on the pull: product quality, marketing, and demand creation."
          - paragraph [ref=e64]:
            - strong [ref=e65]: We are not selling theory. We are sharing what saved us.
            - text: This is tested, this is proven, and this works because we lived it, fixed it, and built a system that helps brands move faster.
